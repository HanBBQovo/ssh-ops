name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            binary_name: sshctl
            asset_name: ssh-ops_darwin_amd64.tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            binary_name: sshctl
            asset_name: ssh-ops_darwin_arm64.tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
            binary_name: sshctl
            asset_name: ssh-ops_linux_amd64.tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
            binary_name: sshctl
            asset_name: ssh-ops_linux_arm64.tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
            binary_name: sshctl.exe
            asset_name: ssh-ops_windows_amd64.zip
          - goos: windows
            goarch: arm64
            archive: zip
            binary_name: sshctl.exe
            asset_name: ssh-ops_windows_arm64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.value }} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${{ matrix.binary_name }}" ./cmd/sshctl

      - name: Package asset
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ matrix.archive }}" == "tar.gz" ]]; then
            tar -C dist -czf "release/${{ matrix.asset_name }}" "${{ matrix.binary_name }}"
          else
            (cd dist && zip -q "../release/${{ matrix.asset_name }}" "${{ matrix.binary_name }}")
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}

  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create skill tarball
        shell: bash
        run: |
          mkdir -p release/ssh-ops-skill/skills release/ssh-ops-skill/examples
          cp -R skills/ssh-ops release/ssh-ops-skill/skills/ssh-ops
          cp examples/config.example.yaml release/ssh-ops-skill/examples/config.example.yaml
          tar -C release -czf release/ssh-ops-skill.tar.gz ssh-ops-skill

      - name: Create skill zip
        shell: bash
        run: |
          (cd release && zip -qr ssh-ops-skill.zip ssh-ops-skill)

      - name: Upload skill tarball
        uses: actions/upload-artifact@v4
        with:
          name: ssh-ops-skill-targz
          path: release/ssh-ops-skill.tar.gz

      - name: Upload skill zip
        uses: actions/upload-artifact@v4
        with:
          name: ssh-ops-skill-zip
          path: release/ssh-ops-skill.zip

  publish:
    needs:
      - build
      - bundle
    runs-on: ubuntu-latest
    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p publish
          find release-assets -type f -maxdepth 2 -exec cp {} publish/ \;
          ls -la publish

      - name: Generate checksums
        shell: bash
        run: |
          cd publish
          shopt -s nullglob
          files=(*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "no release assets found" >&2
            exit 1
          fi
          printf '%s\n' "${files[@]}" | sort | while IFS= read -r file; do
            sha256sum "$file"
          done > SHA256SUMS.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: publish/SHA256SUMS.txt

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release notes
        shell: bash
        run: |
          {
            echo "## Overview"
            echo
            echo "- Prebuilt \`sshctl\` archives for macOS, Linux, and Windows"
            echo "- Manual skill bundles: \`ssh-ops-skill.tar.gz\` and \`ssh-ops-skill.zip\`"
            echo "- \`SHA256SUMS.txt\` for verifying every published asset"
            echo
            echo "## Install"
            echo
            echo "### Codex"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL https://raw.githubusercontent.com/HanBBQovo/ssh-ops/main/install/install.sh | bash -s -- --codex"
            echo "\`\`\`"
            echo
            echo "### Claude Code"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL https://raw.githubusercontent.com/HanBBQovo/ssh-ops/main/install/install.sh | bash -s -- --claude"
            echo "\`\`\`"
            echo
            echo "## Verify Downloads"
            echo
            echo "Linux:"
            echo
            echo "\`\`\`bash"
            echo "sha256sum -c SHA256SUMS.txt"
            echo "\`\`\`"
            echo
            echo "macOS:"
            echo
            echo "\`\`\`bash"
            echo "shasum -a 256 -c SHA256SUMS.txt"
            echo "\`\`\`"
            echo
            echo "## Release Assets"
            echo
            printf '%s\n' publish/* | sed 's#^publish/##' | sort | while IFS= read -r asset; do
              echo "- \`$asset\`"
            done
            echo
            echo "## Metadata"
            echo
            echo "- Tag: \`${{ steps.version.outputs.value }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Workflow: \`${GITHUB_WORKFLOW}\`"
          } > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          files: publish/*
          body_path: release-notes.md
          draft: false
          prerelease: false
